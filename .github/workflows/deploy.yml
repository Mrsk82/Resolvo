name: Deploy to Hostinger VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VPS deploy webhook
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '{"ref":"refs/heads/main"}' | openssl dgmac -sha256 -macopt key:${{ secrets.DEPLOY_SECRET }} | awk '{print $2}')" \
            -d '{"ref":"refs/heads/main"}' \
            https://app.resolvogroup.com/deploy-webhook
          echo "Deploy webhook sent to VPS"
